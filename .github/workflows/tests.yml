name: tests

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Preparar entorno Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ejecutar los tests (JUnit)
        run: mvn clean test

      - name: Fusionar código con la rama 'early'
        if: success()  
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git checkout early
          git merge origin/main
          git push origin early
